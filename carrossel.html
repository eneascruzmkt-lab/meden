<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meden — Gerador de Carrossel</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Red Hat Text',system-ui,sans-serif;background:#f0efed;color:#1a1a18;min-height:100vh}

        /* ---- LAYOUT ---- */
        .app{display:grid;grid-template-columns:380px 1fr;height:100vh}

        /* ---- SIDEBAR ---- */
        .side{background:#fff;border-right:1px solid #e5e2de;padding:24px;overflow-y:auto;display:flex;flex-direction:column;gap:20px}
        .side-logo{font-family:Montserrat,sans-serif;font-size:1.2rem;font-weight:800;color:#1a1a18;margin-bottom:4px}
        .side-logo em{font-style:normal;color:#1a7a5a}
        .side-label{font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#9a958f;margin-bottom:6px}
        .side h2{font-size:1rem;font-weight:700;color:#1a1a18;margin-bottom:16px}

        /* inputs */
        .field{margin-bottom:14px}
        .field label{display:block;font-size:.75rem;font-weight:600;color:#3d3a36;margin-bottom:4px}
        .field input,.field select,.field textarea{width:100%;padding:10px 12px;font-family:inherit;font-size:.88rem;color:#1a1a18;background:#f5f4f1;border:2px solid transparent;border-radius:10px;outline:none;transition:border-color .2s;resize:vertical}
        .field input:focus,.field select:focus,.field textarea:focus{border-color:#1a7a5a;background:#fff}
        .field textarea{min-height:70px}

        /* color swatches */
        .swatches{display:flex;gap:8px;flex-wrap:wrap}
        .swatch{width:36px;height:36px;border-radius:10px;cursor:pointer;border:3px solid transparent;transition:border-color .2s}
        .swatch.active{border-color:#1a1a18}
        .swatch:hover{opacity:.85}

        /* slides list */
        .slides-list{display:flex;flex-direction:column;gap:8px}
        .slide-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:#f5f4f1;border-radius:10px;cursor:pointer;transition:background .2s;font-size:.82rem;font-weight:500}
        .slide-item.active{background:#e6f5ee;color:#1a7a5a;font-weight:600}
        .slide-item:hover{background:#eae7e2}
        .slide-item .num{width:24px;height:24px;background:#1a7a5a;color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
        .slide-item .txt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .slide-item .del{width:20px;height:20px;background:none;border:none;cursor:pointer;color:#b0aca6;font-size:1rem;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:background .2s}
        .slide-item .del:hover{background:#fde8e8;color:#c0392b}

        .btn-add{width:100%;padding:10px;font-family:inherit;font-size:.82rem;font-weight:600;background:#e6f5ee;color:#1a7a5a;border:2px dashed #c8edda;border-radius:10px;cursor:pointer;transition:background .2s}
        .btn-add:hover{background:#d6f2da}

        .btn-export{width:100%;padding:14px;font-family:inherit;font-size:.9rem;font-weight:700;background:#1a7a5a;color:#fff;border:none;border-radius:50px;cursor:pointer;transition:background .2s;margin-top:8px}
        .btn-export:hover{background:#15644a}

        .tip{font-size:.7rem;color:#9a958f;text-align:center;margin-top:4px}

        /* ---- PREVIEW ---- */
        .preview{display:flex;align-items:center;justify-content:center;padding:40px;overflow:auto;background:#e8e6e2}
        .preview-wrap{position:relative}

        /* ---- SLIDE CANVAS ---- */
        .slide{width:1080px;height:1080px;position:relative;overflow:hidden;display:flex;flex-direction:column;transform-origin:top left}
        .slide-bg{position:absolute;inset:0}

        /* themes */
        .slide[data-theme="green"]{background:linear-gradient(158deg,#0f3d2e,#1a7a5a)}
        .slide[data-theme="green"] .s-pill{background:rgba(255,255,255,.12);color:#7ddba8}
        .slide[data-theme="green"] .s-title{color:#fff}
        .slide[data-theme="green"] .s-body{color:rgba(255,255,255,.8)}
        .slide[data-theme="green"] .s-logo{color:#fff}
        .slide[data-theme="green"] .s-logo em{color:#7ddba8}
        .slide[data-theme="green"] .s-num{background:rgba(255,255,255,.12);color:#7ddba8}
        .slide[data-theme="green"] .s-footer-line{background:rgba(255,255,255,.1)}

        .slide[data-theme="light"]{background:#f8f7f5}
        .slide[data-theme="light"] .s-pill{background:#e6f5ee;color:#1a7a5a}
        .slide[data-theme="light"] .s-title{color:#1a1a18}
        .slide[data-theme="light"] .s-body{color:#3d3a36}
        .slide[data-theme="light"] .s-logo{color:#1a1a18}
        .slide[data-theme="light"] .s-logo em{color:#1a7a5a}
        .slide[data-theme="light"] .s-num{background:#e6f5ee;color:#1a7a5a}
        .slide[data-theme="light"] .s-footer-line{background:#eae7e2}

        .slide[data-theme="dark"]{background:#0b1f17}
        .slide[data-theme="dark"] .s-pill{background:rgba(125,219,168,.1);color:#7ddba8}
        .slide[data-theme="dark"] .s-title{color:#fff}
        .slide[data-theme="dark"] .s-body{color:rgba(255,255,255,.7)}
        .slide[data-theme="dark"] .s-logo{color:#fff}
        .slide[data-theme="dark"] .s-logo em{color:#7ddba8}
        .slide[data-theme="dark"] .s-num{background:rgba(255,255,255,.08);color:#7ddba8}
        .slide[data-theme="dark"] .s-footer-line{background:rgba(255,255,255,.08)}

        .slide[data-theme="white"]{background:#ffffff}
        .slide[data-theme="white"] .s-pill{background:#e6f5ee;color:#1a7a5a}
        .slide[data-theme="white"] .s-title{color:#1a1a18}
        .slide[data-theme="white"] .s-body{color:#6b6560}
        .slide[data-theme="white"] .s-logo{color:#1a1a18}
        .slide[data-theme="white"] .s-logo em{color:#1a7a5a}
        .slide[data-theme="white"] .s-num{background:#f5f4f1;color:#1a7a5a}
        .slide[data-theme="white"] .s-footer-line{background:#f0eeeb}

        /* slide content */
        .s-inner{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center;flex:1;padding:80px 88px}
        .s-pill{display:inline-block;align-self:flex-start;font-size:28px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;padding:12px 28px;border-radius:50px;margin-bottom:40px}
        .s-num{display:inline-flex;align-items:center;justify-content:center;width:72px;height:72px;border-radius:50%;font-family:Montserrat,sans-serif;font-size:32px;font-weight:800;margin-bottom:32px}
        .s-title{font-family:Montserrat,sans-serif;font-size:72px;font-weight:800;line-height:1.08;letter-spacing:-.03em;margin-bottom:28px}
        .s-body{font-family:'Red Hat Text',sans-serif;font-size:36px;line-height:1.6;font-weight:400;max-width:860px}
        .s-footer{padding:28px 88px;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1}
        .s-footer-line{height:1px;position:absolute;top:0;left:88px;right:88px}
        .s-logo{font-family:Montserrat,sans-serif;font-size:36px;font-weight:800;letter-spacing:-.03em}
        .s-logo em{font-style:normal}
        .s-dots{display:flex;gap:8px}
        .s-dot{width:14px;height:14px;border-radius:50%;background:rgba(128,128,128,.2)}
        .s-dot.active{background:#1a7a5a}
        .slide[data-theme="green"] .s-dot.active,.slide[data-theme="dark"] .s-dot.active{background:#7ddba8}

        /* orbs for green/dark themes */
        .s-orb{position:absolute;border-radius:50%;filter:blur(120px);opacity:.3}
        .slide[data-theme="green"] .s-orb-1{width:600px;height:600px;background:#14a06e;top:-15%;right:-10%}
        .slide[data-theme="green"] .s-orb-2{width:400px;height:400px;background:#0f5c42;bottom:-10%;left:-5%}
        .slide[data-theme="dark"] .s-orb-1{width:600px;height:600px;background:#1a7a5a;top:-15%;right:-10%;opacity:.4}
        .slide[data-theme="dark"] .s-orb-2{width:400px;height:400px;background:#14a06e;bottom:-10%;left:-5%;opacity:.25}
        .slide[data-theme="light"] .s-orb-1,.slide[data-theme="light"] .s-orb-2,
        .slide[data-theme="white"] .s-orb-1,.slide[data-theme="white"] .s-orb-2{display:none}

        /* scale preview */
        .preview-wrap{transform:scale(var(--preview-scale,0.5))}

        /* responsive */
        @media(max-width:900px){
            .app{grid-template-columns:1fr;grid-template-rows:auto 1fr}
            .side{max-height:50vh;border-right:none;border-bottom:1px solid #e5e2de}
            .preview{padding:20px}
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="side">
            <div>
                <div class="side-logo">me<em>d</em>en</div>
                <span class="side-label">Gerador de carrossel</span>
            </div>

            <div>
                <h2>Tema</h2>
                <div class="swatches" id="swatches">
                    <div class="swatch active" data-theme="green" style="background:linear-gradient(135deg,#0f3d2e,#1a7a5a)" title="Verde"></div>
                    <div class="swatch" data-theme="dark" style="background:#0b1f17" title="Escuro"></div>
                    <div class="swatch" data-theme="light" style="background:#f8f7f5;border:1px solid #e5e2de" title="Claro"></div>
                    <div class="swatch" data-theme="white" style="background:#fff;border:1px solid #e5e2de" title="Branco"></div>
                </div>
            </div>

            <div>
                <h2>Slides</h2>
                <div class="slides-list" id="slidesList"></div>
                <button class="btn-add" id="btnAdd">+ Adicionar slide</button>
            </div>

            <div id="editor" style="display:none">
                <h2>Editando slide <span id="editorNum"></span></h2>
                <div class="field">
                    <label>Tipo</label>
                    <select id="slideType">
                        <option value="pill">Com etiqueta (pill)</option>
                        <option value="number">Com numero</option>
                        <option value="title-only">So titulo</option>
                    </select>
                </div>
                <div class="field" id="fieldPill">
                    <label>Etiqueta</label>
                    <input type="text" id="slidePill" placeholder="Ex: Sabia disso?">
                </div>
                <div class="field">
                    <label>Titulo</label>
                    <textarea id="slideTitle" placeholder="Titulo principal do slide"></textarea>
                </div>
                <div class="field">
                    <label>Texto (opcional)</label>
                    <textarea id="slideBody" placeholder="Texto de apoio"></textarea>
                </div>
            </div>

            <div style="margin-top:auto">
                <button class="btn-export" id="btnExport">Baixar slide atual (PNG)</button>
                <p class="tip">Use print da tela ou clique para baixar via canvas</p>
            </div>
        </div>

        <div class="preview">
            <div class="preview-wrap" id="previewWrap">
                <div class="slide" id="slideCanvas" data-theme="green">
                    <div class="slide-bg">
                        <div class="s-orb s-orb-1"></div>
                        <div class="s-orb s-orb-2"></div>
                    </div>
                    <div class="s-inner">
                        <div class="s-pill" id="canvasPill">Dica de saude</div>
                        <div class="s-num" id="canvasNum" style="display:none">1</div>
                        <div class="s-title" id="canvasTitle">Seu titulo aqui</div>
                        <div class="s-body" id="canvasBody">Texto de apoio do slide.</div>
                    </div>
                    <div class="s-footer">
                        <div class="s-footer-line"></div>
                        <div class="s-logo">me<em>d</em>en</div>
                        <div class="s-dots" id="canvasDots"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    var slides = [
        {type:'pill', pill:'Voce sabia?', title:'O GLP-1 reduz o apetite de forma natural', body:'Ele atua nos receptores do cerebro que controlam a saciedade, fazendo voce sentir menos fome sem esforco.'},
        {type:'number', pill:'', title:'Como funciona o tratamento?', body:'Nosso medico avalia seu caso, prescreve o tratamento personalizado e acompanha sua evolucao semana a semana.'},
        {type:'pill', pill:'Resultado real', title:'-14kg em 5 meses', body:'Renata, de Recife, perdeu 14kg com acompanhamento medico completo. Sem dietas malucas, sem efeito sanfona.'},
        {type:'title-only', pill:'', title:'Quer comecar?\nAvaliacao gratuita.', body:'Link na bio.'}
    ];
    var currentSlide = 0;
    var currentTheme = 'green';

    var slidesList = document.getElementById('slidesList');
    var editor = document.getElementById('editor');
    var editorNum = document.getElementById('editorNum');
    var slideType = document.getElementById('slideType');
    var slidePill = document.getElementById('slidePill');
    var slideTitle = document.getElementById('slideTitle');
    var slideBody = document.getElementById('slideBody');
    var fieldPill = document.getElementById('fieldPill');
    var canvas = document.getElementById('slideCanvas');
    var canvasPill = document.getElementById('canvasPill');
    var canvasNum = document.getElementById('canvasNum');
    var canvasTitle = document.getElementById('canvasTitle');
    var canvasBody = document.getElementById('canvasBody');
    var canvasDots = document.getElementById('canvasDots');

    function render() {
        // list
        slidesList.innerHTML = '';
        slides.forEach(function(s, i) {
            var d = document.createElement('div');
            d.className = 'slide-item' + (i === currentSlide ? ' active' : '');
            d.innerHTML = '<span class="num">' + (i+1) + '</span><span class="txt">' + (s.title || 'Slide ' + (i+1)) + '</span>' + (slides.length > 1 ? '<button class="del" data-i="'+i+'">&times;</button>' : '');
            d.addEventListener('click', function(e) { if (!e.target.classList.contains('del')) { currentSlide = i; render(); } });
            slidesList.appendChild(d);
        });
        // delete btns
        document.querySelectorAll('.del').forEach(function(b) {
            b.addEventListener('click', function() {
                var idx = parseInt(b.dataset.i);
                slides.splice(idx, 1);
                if (currentSlide >= slides.length) currentSlide = slides.length - 1;
                render();
            });
        });
        // editor
        var s = slides[currentSlide];
        if (s) {
            editor.style.display = 'block';
            editorNum.textContent = '#' + (currentSlide + 1);
            slideType.value = s.type;
            slidePill.value = s.pill || '';
            slideTitle.value = s.title || '';
            slideBody.value = s.body || '';
            fieldPill.style.display = s.type === 'pill' ? 'block' : 'none';
        }
        // canvas
        renderCanvas();
    }

    function renderCanvas() {
        var s = slides[currentSlide];
        if (!s) return;
        canvas.dataset.theme = currentTheme;
        canvasPill.style.display = s.type === 'pill' ? 'inline-block' : 'none';
        canvasPill.textContent = s.pill || '';
        canvasNum.style.display = s.type === 'number' ? 'inline-flex' : 'none';
        canvasNum.textContent = currentSlide + 1;
        canvasTitle.innerHTML = (s.title || '').replace(/\n/g, '<br>');
        canvasBody.innerHTML = (s.body || '').replace(/\n/g, '<br>');
        canvasBody.style.display = s.body ? 'block' : 'none';
        // dots
        var dots = '';
        for (var i = 0; i < slides.length; i++) {
            dots += '<div class="s-dot' + (i === currentSlide ? ' active' : '') + '"></div>';
        }
        canvasDots.innerHTML = dots;
    }

    // inputs
    slideType.addEventListener('change', function() { slides[currentSlide].type = this.value; render(); });
    slidePill.addEventListener('input', function() { slides[currentSlide].pill = this.value; renderCanvas(); });
    slideTitle.addEventListener('input', function() { slides[currentSlide].title = this.value; renderCanvas(); render(); });
    slideBody.addEventListener('input', function() { slides[currentSlide].body = this.value; renderCanvas(); });

    // add slide
    document.getElementById('btnAdd').addEventListener('click', function() {
        slides.push({type:'pill', pill:'Etiqueta', title:'Novo slide', body:''});
        currentSlide = slides.length - 1;
        render();
    });

    // theme swatches
    document.querySelectorAll('.swatch').forEach(function(sw) {
        sw.addEventListener('click', function() {
            document.querySelectorAll('.swatch').forEach(function(s) { s.classList.remove('active'); });
            sw.classList.add('active');
            currentTheme = sw.dataset.theme;
            renderCanvas();
        });
    });

    // export
    document.getElementById('btnExport').addEventListener('click', function() {
        var el = document.getElementById('slideCanvas');
        el.style.transform = 'none';
        // use html2canvas if available, otherwise prompt print
        if (typeof html2canvas !== 'undefined') {
            html2canvas(el, {scale:1, width:1080, height:1080, useCORS:true}).then(function(c) {
                var a = document.createElement('a');
                a.download = 'meden-slide-' + (currentSlide+1) + '.png';
                a.href = c.toDataURL('image/png');
                a.click();
            });
        } else {
            // fallback: open in new window for screenshot
            var w = window.open('', '_blank', 'width=1080,height=1080');
            w.document.write('<!DOCTYPE html><html><head><style>body{margin:0}</style>');
            w.document.write('<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">');
            w.document.write('<style>' + document.querySelector('style').textContent + '</style>');
            w.document.write('</head><body>');
            w.document.write(el.outerHTML.replace('transform-origin:top left',''));
            w.document.write('<p style="position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-family:system-ui;font-size:13px;color:#999;background:#fff;padding:6px 16px;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1)">Clique direito > Salvar imagem como... ou Print Screen</p>');
            w.document.write('</body></html>');
            w.document.close();
        }
    });

    // scale preview to fit
    function scalePreview() {
        var wrap = document.getElementById('previewWrap');
        var preview = document.querySelector('.preview');
        var pw = preview.clientWidth - 80;
        var ph = preview.clientHeight - 80;
        var scale = Math.min(pw / 1080, ph / 1080, 1);
        wrap.style.setProperty('--preview-scale', scale);
        wrap.style.transform = 'scale(' + scale + ')';
    }
    window.addEventListener('resize', scalePreview);
    scalePreview();

    render();
    </script>
</body>
</html>
